<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSpire Nutrition — Scan for Menu</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9; color: #1e2a5e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .sheet {
      background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(2,8,23,.12);
      padding: 2.2rem 2.5rem 2rem; text-align: center; max-width: 460px; width: 92%;
    }
    .sheet > img.brand { height: 108px; width: auto; margin-bottom: .4rem; }
    .sub { color: #475569; margin: .1rem 0 1.4rem; font-size: 1.05rem; }
    #qr { display: inline-flex; padding: 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; }
    #qr canvas { display: block; }
    .scan { margin: 1.2rem 0 .2rem; font-size: 1.3rem; font-weight: 800; letter-spacing: .5px; color: #e11d2a; }
    .url { color: #64748b; font-size: .85rem; word-break: break-all; margin-top: .3rem; }
    .print { margin-top: 1.4rem; }
    button { font: inherit; cursor: pointer; border: none; border-radius: 10px; background: #1e2a5e; color: #fff; font-weight: 700; padding: 11px 22px; }
    @media print { body { background: #fff; } .sheet { box-shadow: none; } .print { display: none; } }
  </style>
</head>
<body>
  <div class="sheet">
    <img class="brand" src="nspire_logo.webp" alt="NSpire Nutrition" />
    <div class="sub">Our full drink menu — right on your phone</div>
    <div id="qr"></div>
    <div class="scan">📲 SCAN ME</div>
    <div class="url" id="url"></div>
    <div class="print"><button onclick="window.print()">Print this page</button></div>
  </div>
  <script>
    var MENU_URL = "https://beardedinfosec.github.io/NSpire/";
    document.getElementById("url").textContent = MENU_URL;

    var canvas = document.createElement("canvas");
    // High error correction so the centered logo doesn't break scanning
    QRCode.toCanvas(canvas, MENU_URL, { width: 340, margin: 1, errorCorrectionLevel: "H", color: { dark: "#1e2a5e", light: "#ffffff" } }, function (err) {
      if (err) { document.getElementById("qr").textContent = "QR failed to load"; return; }
      document.getElementById("qr").appendChild(canvas);
      var ctx = canvas.getContext("2d");
      var logo = new Image();
      logo.onload = function () {
        var box = canvas.width * 0.30;          // white backing square
        var pad = box * 0.10;
        var lx = (canvas.width - box) / 2, ly = (canvas.height - box) / 2;
        // rounded white backing so the logo reads cleanly over the QR
        var r = 14;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(lx + r, ly);
        ctx.arcTo(lx + box, ly, lx + box, ly + box, r);
        ctx.arcTo(lx + box, ly + box, lx, ly + box, r);
        ctx.arcTo(lx, ly + box, lx, ly, r);
        ctx.arcTo(lx, ly, lx + box, ly, r);
        ctx.closePath();
        ctx.fill();
        var inner = box - pad * 2;
        ctx.drawImage(logo, lx + pad, ly + pad, inner, inner);
      };
      logo.src = "nspire_logo.webp";
    });
  </script>
</body>
</html>
