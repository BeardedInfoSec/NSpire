<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSpire Nutrition — Scan for Menu</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f5f9; color: #1e2a5e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .sheet { background: #fff; border-radius: 20px; box-shadow: 0 10px 40px rgba(2,8,23,.12);
      padding: 2.2rem 2.5rem 2rem; text-align: center; max-width: 460px; width: 92%; }
    .sheet > img.brand { height: 108px; width: auto; margin-bottom: .4rem; }
    .sub { color: #475569; margin: .1rem 0 1.4rem; font-size: 1.05rem; }
    #qr { display: inline-flex; padding: 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; }
    #qr canvas { display: block; width: 300px; height: 300px; image-rendering: pixelated; }
    .scan { margin: 1.2rem 0 .2rem; font-size: 1.3rem; font-weight: 800; letter-spacing: .5px; color: #e11d2a; }
    .url { color: #64748b; font-size: .85rem; word-break: break-all; margin-top: .3rem; }
    .print { margin-top: 1.4rem; }
    button { font: inherit; cursor: pointer; border: none; border-radius: 10px; background: #1e2a5e; color: #fff; font-weight: 700; padding: 11px 22px; }
    @media print { body { background: #fff; } .sheet { box-shadow: none; } .print { display: none; } }
  </style>
</head>
<body>
  <div class="sheet">
    <img class="brand" src="nspire_logo.webp" alt="NSpire Nutrition" />
    <div class="sub">Our full drink menu — right on your phone</div>
    <div id="qr"></div>
    <div class="scan">📲 SCAN ME</div>
    <div class="url" id="url"></div>
    <div class="print"><button onclick="window.print()">Print this page</button></div>
  </div>
  <script>
    var MENU_URL = "https://beardedinfosec.github.io/NSpire/";
    document.getElementById("url").textContent = MENU_URL;
    var qrBox = document.getElementById("qr");

    try {
      // High error-correction ('H' = ~30% recovery) so the centered logo won't break scanning
      var qr = qrcode(0, "H");
      qr.addData(MENU_URL);
      qr.make();
      var count = qr.getModuleCount();
      var quiet = 4;                       // quiet-zone modules
      var scale = 10;                      // px per module -> crisp, high-res canvas
      var dim = (count + quiet * 2) * scale;

      var canvas = document.createElement("canvas");
      canvas.width = dim; canvas.height = dim;
      var ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, dim, dim);
      ctx.fillStyle = "#1e2a5e";
      for (var r = 0; r < count; r++) {
        for (var c = 0; c < count; c++) {
          if (qr.isDark(r, c)) ctx.fillRect((c + quiet) * scale, (r + quiet) * scale, scale, scale);
        }
      }
      qrBox.appendChild(canvas);

      // Overlay the logo in the middle over a rounded white backing
      var logo = new Image();
      logo.onload = function () {
        var box = dim * 0.28, pad = box * 0.10, rad = 16;
        var x = (dim - box) / 2, y = (dim - box) / 2;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.moveTo(x + rad, y);
        ctx.arcTo(x + box, y, x + box, y + box, rad);
        ctx.arcTo(x + box, y + box, x, y + box, rad);
        ctx.arcTo(x, y + box, x, y, rad);
        ctx.arcTo(x, y, x + box, y, rad);
        ctx.closePath(); ctx.fill();
        ctx.drawImage(logo, x + pad, y + pad, box - pad * 2, box - pad * 2);
      };
      logo.src = "nspire_logo.webp";
    } catch (e) {
      qrBox.innerHTML = '<div style="padding:1rem;color:#b91c1c;font-size:.9rem;">Could not draw QR. Open the menu directly:<br>' + MENU_URL + "</div>";
    }
  </script>
</body>
</html>
