<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSpire Tea — Menu</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #1e2a5e;
      --brand-ink: #1e2a5e;
      --accent: #e11d2a;
      --gold: #b45309;
      --gold-bg: #fef3c7;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--ink);
      -webkit-text-size-adjust: 100%;
    }

    header {
      position: sticky; top: 0; z-index: 50;
      background: #fff; border-bottom: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(2,8,23,.05);
      padding: .45rem .7rem .5rem;
    }
    .brand { display: flex; justify-content: center; }
    .brand img { height: 42px; width: auto; }
    .tagline { display: none; }

    .search-row { display: flex; gap: .5rem; max-width: 720px; margin: .4rem auto 0; }
    .searchbox {
      flex: 1 1 auto; display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      padding: 6px 8px; border: 2px solid #cbd5e1; border-radius: 12px; background: #fff; cursor: text;
    }
    .searchbox:focus-within { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(30,42,94,.12); }
    #search {
      flex: 1 1 90px; min-width: 90px; border: none; outline: none; background: transparent;
      font-size: 16px; padding: 5px 2px; color: var(--ink);
    }
    .schip {
      display: inline-flex; align-items: center; gap: 5px; background: var(--brand); color: #fff;
      border-radius: 999px; padding: 4px 5px 4px 11px; font-size: .85rem; font-weight: 600; white-space: nowrap;
    }
    .schip button {
      border: none; background: rgba(255,255,255,.28); color: #fff; width: 18px; height: 18px;
      border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .schip button:hover { background: rgba(255,255,255,.5); }
    #clearBtn {
      padding: 0 14px; border-radius: 12px; border: 2px solid var(--line);
      background: #f8fafc; color: #334155; font-size: 14px; cursor: pointer;
    }
    #clearBtn:disabled { opacity: .5; cursor: default; }

    .filters { max-width: 720px; margin: .45rem auto 0; display: flex; flex-direction: column; gap: .35rem; }
    .filter-row {
      display: flex; flex-wrap: nowrap; gap: .4rem;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid #cbd5e1; background: #fff; color: #334155;
      padding: 6px 12px; border-radius: 999px; font-size: .82rem; cursor: pointer;
      white-space: nowrap; user-select: none; transition: .12s;
    }
    .chip:hover { background: #f1f5f9; }
    .chip.active { background: var(--brand); border-color: var(--brand); color: #fff; }

    #count { color: var(--muted); font-size: .78rem; margin: .2rem 0 .5rem; }

    main { max-width: 720px; margin: 0 auto; padding: 1rem 1rem 3rem; }
    .section-head {
      margin: 1.1rem 0 .6rem; padding: .2rem 0;
      font-size: 1.02rem; font-weight: 800; color: var(--brand-ink);
      border-bottom: 2px solid var(--line);
    }
    .section-head:first-child { margin-top: .3rem; }

    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: .85rem 1rem; margin-bottom: .7rem; box-shadow: 0 1px 3px rgba(2,8,23,.05);
    }
    .card-top { display: flex; align-items: baseline; justify-content: space-between; gap: .6rem; }
    .card-name { font-size: 1.06rem; font-weight: 700; color: var(--ink); line-height: 1.25; }
    .card-price { color: #059669; font-weight: 700; white-space: nowrap; }
    .card-ingredients { margin-top: .35rem; color: #334155; font-size: .93rem; line-height: 1.4; }
    .badges { margin-top: .55rem; display: flex; flex-wrap: wrap; gap: .35rem; }
    .badge {
      font-size: .72rem; font-weight: 600; padding: 3px 8px; border-radius: 999px;
      background: #f1f5f9; color: #475569; border: 1px solid var(--line);
    }
    .badge.specialty { background: var(--gold-bg); color: var(--gold); border-color: #fde68a; }
    .badge.caffeine { background: #ede9fe; color: #6d28d9; border-color: #ddd6fe; }
    .badge.caffeinefree { background: #dcfce7; color: #15803d; border-color: #bbf7d0; }
    .badge.protein { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
    .badge.nuts { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
    .badge.kids { background: #fce7f3; color: #be185d; border-color: #fbcfe8; }

    .recipe { margin-top: .55rem; border-top: 1px dashed var(--line); padding-top: .45rem; }
    .recipe summary { cursor: pointer; font-size: .82rem; font-weight: 700; color: var(--brand-ink); list-style: none; user-select: none; }
    .recipe summary::-webkit-details-marker { display: none; }
    .recipe summary::before { content: "▸ "; }
    .recipe[open] summary::before { content: "▾ "; }
    .rbody { margin-top: .5rem; display: grid; gap: .3rem; }
    .rstep { display: flex; gap: .5rem; font-size: .87rem; line-height: 1.35; }
    .rlabel { flex: 0 0 96px; color: var(--muted); font-weight: 600; }
    .rlabel.liftoff { color: var(--accent); }
    .rval { color: #1e293b; white-space: pre-line; }

    mark { background: #fde68a; color: #111827; padding: 0 2px; border-radius: 3px; }

    #status { text-align: center; color: var(--muted); padding: 3rem 1rem; font-style: italic; }
    .footer { text-align: center; color: var(--muted); font-size: .72rem; padding: 1.5rem 1rem 2rem; }
  </style>
</head>
<body>
  <header>
    <div class="brand"><img src="nspire_logo.webp" alt="NSpire Nutrition" /></div>
    <div class="tagline">Loaded teas · protein shakes · iced coffees & more</div>
    <div class="search-row">
      <div class="searchbox" id="searchbox">
        <input id="search" type="text" autocomplete="off" autocapitalize="none" autocorrect="off"
               placeholder="Search flavors… (press enter to add)" />
      </div>
      <button id="clearBtn" disabled>Clear</button>
    </div>
    <div class="filters" id="filters"></div>
  </header>

  <main>
    <div id="count"></div>
    <div id="list"></div>
  </main>
  <div id="status">Loading menu…</div>
  <div class="footer">NSpire Nutrition · Menu updates in real time</div>

  <script>
    const SECTION_ORDER = ["Loaded Teas", "Protein Shakes", "Iced Coffees", "Caffeine-Free", "Mega Refreshers"];
    const TAG_FILTERS = [
      { key: "specialty",     label: "★ Specialty" },
      { key: "caffeine",      label: "⚡ Caffeine" },
      { key: "caffeine-free", label: "○ Caffeine-Free" },
      { key: "protein",       label: "💪 Protein" },
      { key: "kids",          label: "🧒 Kids" },
    ];
    const BADGE_LABELS = {
      "specialty": "★ Specialty",
      "caffeine": "⚡ Caffeine",
      "caffeine-free": "Caffeine-Free",
      "protein": "💪 Protein",
      "collagen": "Collagen",
      "nuts": "🥜 Contains nuts",
      "kids": "🧒 Kids",
    };

    let items = [];
    let activeSection = "All";
    let activeTags = new Set();
    let searchTokens = [];   // committed search words (pills)
    let curTerms = [];       // pills + the word being typed (used for filter + highlight)
    let debounce;

    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");
    const filtersEl = document.getElementById("filters");
    const searchbox = document.getElementById("searchbox");
    const searchEl = document.getElementById("search");
    const clearBtn = document.getElementById("clearBtn");

    fetch("./menu.json?" + Date.now())
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(data => {
        items = Array.isArray(data) ? data : (data.items || []);
        statusEl.style.display = "none";
        buildFilters();
        render();
      })
      .catch(err => { statusEl.textContent = "Couldn't load the menu (" + err.message + ")."; });

    function buildFilters() {
      const present = new Set(items.map(i => i.section));
      const sections = ["All", ...SECTION_ORDER.filter(s => present.has(s))];
      filtersEl.innerHTML = "";

      // Row 1 — sections (tap an active one to clear back to All)
      const row1 = document.createElement("div"); row1.className = "filter-row";
      sections.forEach(s => row1.appendChild(chip(s, s === activeSection, () => {
        activeSection = (activeSection === s && s !== "All") ? "All" : s;
        syncChips(); render();
      })));
      filtersEl.appendChild(row1);

      // Row 2 — attribute filters
      const row2 = document.createElement("div"); row2.className = "filter-row";
      TAG_FILTERS.forEach(t => {
        if (!items.some(i => (i.tags || []).includes(t.key))) return;
        row2.appendChild(chip(t.label, activeTags.has(t.key), () => {
          activeTags.has(t.key) ? activeTags.delete(t.key) : activeTags.add(t.key);
          syncChips(); render();
        }, "tag:" + t.key));
      });
      if (row2.children.length) filtersEl.appendChild(row2);
    }
    function chip(label, active, onClick, key) {
      const b = document.createElement("button");
      b.className = "chip" + (active ? " active" : "");
      b.textContent = label; b.dataset.key = key || ("sec:" + label);
      b.addEventListener("click", onClick);
      return b;
    }
    function syncChips() {
      filtersEl.querySelectorAll(".chip").forEach(c => {
        const k = c.dataset.key;
        if (k.startsWith("sec:")) c.classList.toggle("active", k === "sec:" + activeSection);
        else if (k.startsWith("tag:")) c.classList.toggle("active", activeTags.has(k.slice(4)));
      });
    }

    // Tap anywhere in the box focuses the text field
    searchbox.addEventListener("click", () => searchEl.focus());

    function addToken(phrase) {
      phrase = phrase.trim().toLowerCase().replace(/\s+/g, " ");
      if (phrase && !searchTokens.includes(phrase)) searchTokens.push(phrase);
    }
    // Each pill is ONE whole phrase; a drink must contain every pill (and the text being typed) as-is
    function computeTerms() {
      const terms = searchTokens.slice();
      const typing = searchEl.value.trim().toLowerCase().replace(/\s+/g, " ");
      if (typing) terms.push(typing);
      return terms;
    }
    function updateClear() { clearBtn.disabled = !searchTokens.length && !searchEl.value; }
    function scheduleRender() { clearTimeout(debounce); debounce = setTimeout(render, 130); }

    function renderTokens() {
      searchbox.querySelectorAll(".schip").forEach(n => n.remove());
      searchTokens.forEach(w => {
        const s = document.createElement("span"); s.className = "schip";
        s.appendChild(document.createTextNode(w));
        const x = document.createElement("button"); x.type = "button"; x.textContent = "×"; x.setAttribute("aria-label", "remove " + w);
        x.addEventListener("click", ev => { ev.stopPropagation(); searchTokens = searchTokens.filter(t => t !== w); renderTokens(); updateClear(); scheduleRender(); searchEl.focus(); });
        s.appendChild(x);
        searchbox.insertBefore(s, searchEl);
      });
      searchEl.placeholder = searchTokens.length ? "add another…" : "Search flavors… (press enter to add)";
    }

    // Live-filter as you type; Enter locks the text in as one pill (spaces allowed)
    searchEl.addEventListener("input", () => { updateClear(); scheduleRender(); });
    searchEl.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        if (searchEl.value.trim()) { addToken(searchEl.value); searchEl.value = ""; renderTokens(); updateClear(); scheduleRender(); }
        e.preventDefault();
      } else if (e.key === "Backspace" && !searchEl.value && searchTokens.length) {
        searchTokens.pop(); renderTokens(); updateClear(); scheduleRender();
      }
    });
    clearBtn.addEventListener("click", () => { searchTokens = []; searchEl.value = ""; renderTokens(); updateClear(); render(); searchEl.focus(); });

    function matches(it) {
      if (activeSection !== "All" && it.section !== activeSection) return false;
      for (const t of activeTags) if (!(it.tags || []).includes(t)) return false;
      if (curTerms.length) {
        const hay = (it.name + " " + it.ingredients + " " + (it.tags || []).join(" ") + " " + (it.recipe || []).map(s => s.value).join(" ")).toLowerCase();
        if (!curTerms.every(tok => hay.includes(tok))) return false;
      }
      return true;
    }

    function render() {
      curTerms = computeTerms();
      const shown = items.filter(matches);
      countEl.textContent = shown.length + " of " + items.length + " drinks";
      const groups = {};
      shown.forEach(i => (groups[i.section] = groups[i.section] || []).push(i));
      const order = SECTION_ORDER.filter(s => groups[s]);
      listEl.innerHTML = "";
      if (!shown.length) { listEl.innerHTML = '<div id="status">No drinks match. Try a different search.</div>'; return; }
      order.forEach(sec => {
        const h = document.createElement("div"); h.className = "section-head";
        h.textContent = sec + " (" + groups[sec].length + ")"; listEl.appendChild(h);
        groups[sec].sort((a, b) => a.name.localeCompare(b.name)).forEach(it => listEl.appendChild(card(it)));
      });
    }

    function card(it) {
      const el = document.createElement("div"); el.className = "card";
      const price = it.priceUsd != null ? '<div class="card-price">$' + Number(it.priceUsd).toFixed(2).replace(/\.00$/, "") + '</div>' : "";
      const badges = (it.tags || []).filter(t => BADGE_LABELS[t])
        .map(t => '<span class="badge ' + t.replace("-", "") + '">' + BADGE_LABELS[t] + "</span>").join("");
      el.innerHTML =
        '<div class="card-top"><div class="card-name">' + hi(it.name) + "</div>" + price + "</div>" +
        '<div class="card-ingredients">' + hi(it.ingredients) + "</div>" +
        (badges ? '<div class="badges">' + badges + "</div>" : "") +
        recipeHtml(it);
      return el;
    }

    function recipeHtml(it) {
      if (!it.recipe || !it.recipe.length) return "";
      const rows = it.recipe.map(s => {
        if (s.label) {
          const lo = /lift ?off/i.test(s.label) ? " liftoff" : "";
          return '<div class="rstep"><span class="rlabel' + lo + '">' + esc(s.label) + '</span><span class="rval">' + hi(s.value) + "</span></div>";
        }
        return '<div class="rstep"><span class="rval">• ' + hi(s.value) + "</span></div>";
      }).join("");
      return '<details class="recipe"><summary>How it’s made</summary><div class="rbody">' + rows + "</div></details>";
    }

    function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }
    function hi(s) {
      const safe = esc(s);
      if (!curTerms.length) return safe;
      const toks = curTerms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).filter(Boolean);
      if (!toks.length) return safe;
      return safe.replace(new RegExp("(" + toks.join("|") + ")", "gi"), "<mark>$1</mark>");
    }
  </script>
</body>
</html>
